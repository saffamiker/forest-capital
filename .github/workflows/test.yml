name: Forest Capital — Test Suite

on:
  push:
    branches: ["*"]
  pull_request:
    branches: [main]

jobs:
  # ── BACKEND TESTS ──────────────────────────────────────────────────────
  backend-tests:
    name: Backend Unit Tests (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run pytest with coverage
        run: pytest ../tests/ -v --cov=. --cov-report=term-missing
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          ENVIRONMENT: test
          ALLOWED_EMAILS: ruurdsm@queens.edu,thaob@queens.edu,murdockm@queens.edu,panttserk@queens.edu
          SECRET_KEY: test_secret_key_for_ci
          MASTER_API_KEY: test_master_key

  # ── FRONTEND TESTS ─────────────────────────────────────────────────────
  frontend-tests:
    name: Frontend Component Tests (Vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest
        run: npm run test -- --reporter=verbose

      - name: Lint check
        run: npm run lint

  # ── E2E TESTS ──────────────────────────────────────────────────────────
  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Start backend
        working-directory: backend
        run: uvicorn main:app --port 8000 &
        env:
          ENVIRONMENT: test
          ALLOWED_EMAILS: ruurdsm@queens.edu,thaob@queens.edu,murdockm@queens.edu,panttserk@queens.edu
          SECRET_KEY: test_secret_key_for_ci
          MASTER_API_KEY: test_master_key

      - name: Start frontend
        working-directory: frontend
        run: npm run dev &

      - name: Wait for services
        run: |
          npx wait-on http://localhost:8000/api/health
          npx wait-on http://localhost:5173

      - name: Run Playwright E2E tests
        working-directory: frontend
        run: npx playwright test

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
