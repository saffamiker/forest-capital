name: Forest Capital — Test Suite

on:
  push:
    branches: ["*"]
  pull_request:
    branches: [main]

jobs:
  # ── BACKEND TESTS ──────────────────────────────────────────────────────
  backend-tests:
    name: Backend Unit Tests (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run pytest with coverage
        run: pytest ../tests/ -v --cov=. --cov-report=term-missing
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          ENVIRONMENT: test
          ALLOWED_EMAILS: ruurdsm@queens.edu,thaob@queens.edu,murdockm@queens.edu,panttserk@queens.edu
          SECRET_KEY: test_secret_key_for_ci_at_least_32_chars
          MASTER_API_KEY: test_master_key

  # ── FRONTEND TESTS ─────────────────────────────────────────────────────
  frontend-tests:
    name: Frontend Component Tests (Vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest
        run: npm run test -- --reporter=verbose

      - name: Lint check
        run: npm run lint

  # ── E2E TESTS ──────────────────────────────────────────────────────────
  # Fixed in Sprint 5: tests now run against the live Render + Vercel
  # deployments instead of spinning up local services in CI.
  # This eliminates the uvicorn startup race (issue #1, now closed).
  e2e-tests:
    name: E2E Tests (Playwright — live deployment)
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run Playwright E2E tests (live deployment)
        working-directory: frontend
        run: npx playwright test
        env:
          PLAYWRIGHT_BASE_URL: https://forest-capital.vercel.app
          API_URL: https://forest-capital.onrender.com

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4.6.2
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
