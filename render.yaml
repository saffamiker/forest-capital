services:
  - type: web
    name: forest-capital-api
    runtime: python
    region: oregon
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: ENVIRONMENT
        value: production
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: SENDGRID_FROM_EMAIL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: MASTER_API_KEY
        sync: false
      - key: FRED_API_KEY
        sync: false
      - key: ALLOWED_EMAILS
        value: ruurdsm@queens.edu,thaob@queens.edu,murdockm@queens.edu,panttserk@queens.edu
      - key: MAGIC_LINK_EXPIRY_MINUTES
        value: 15
      - key: SESSION_EXPIRY_HOURS
        value: 8
      - key: DAILY_CREDIT_CAP_USD
        value: 5.00
      - key: LOG_LEVEL
        value: INFO
