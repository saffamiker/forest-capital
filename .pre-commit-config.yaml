repos:
  - repo: https://github.com/psf/black
    rev: 24.4.2
    hooks:
      - id: black
        language_version: python3.12

  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: ["--profile", "black"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
        args: ["--fix"]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        args: ["--strict", "--ignore-missing-imports"]
        additional_dependencies:
          - pydantic
          - types-python-jose

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.3.0
    hooks:
      - id: prettier
        types_or: [ts, tsx, css, json]

  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v8.57.0
    hooks:
      - id: eslint
        files: \.(ts|tsx)$
        args: ["--fix"]
        additional_dependencies:
          - eslint@8
          - "@typescript-eslint/eslint-plugin"
          - "@typescript-eslint/parser"

  - repo: local
    hooks:
      - id: no-secrets
        name: Check for secrets
        entry: detect-secrets scan
        language: python
        pass_filenames: false

      # Changelog contract — a new migration must include a changelog
      # INSERT. Fast, so it runs on every commit.
      - id: changelog-gate
        name: Changelog gate
        entry: python scripts/changelog_gate.py
        language: system
        pass_filenames: false

      # Heavier checks run at push time, not on every commit.
      # language: system so they use the developer's installed tools
      # (an isolated hook env would not have pytest or the frontend deps).
      - id: pytest
        name: pytest
        entry: pytest
        language: system
        pass_filenames: false
        stages: [pre-push]

      - id: frontend-typecheck
        name: TypeScript check
        entry: npm run typecheck --prefix frontend
        language: system
        pass_filenames: false
        stages: [pre-push]
